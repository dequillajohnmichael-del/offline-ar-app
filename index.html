<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline WebAR Background</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a192f; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        #disclaimer { font-size: 0.8rem; color: #888; margin-top: 30px; max-width: 320px; line-height: 1.5; }
        
        /* The Moving Video Background (Stretched across the entire screen layout) */
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Your Live Camera Feed Bubble Overlay */
        #webcam { position: absolute; top: 20px; right: 20px; width: 140px; height: 185px; object-fit: cover; border-radius: 16px; border: 3px solid #00ffcc; transform: scaleX(-1); z-index: 5; box-shadow: 0 8px 25px rgba(0,0,0,0.6); background: #121212; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Syncing WebAR background mechanics...<br>Please wait.</div>
        <div id="disclaimer">⚠️ For complete offline background features, open this page directly in Safari or Chrome instead of staying inside the temporary QR scanner window.</div>
    </div>

    <!-- Active interactive layout maps -->
    <video id="webcam" autoplay playsinline muted></video>
    <video id="bg-video" src="./background.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>

    <script>
        // --- 1. Service Worker Caching Registration Engine ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW bypass:", err));
        }

        // SPEED BYPASS: Instantly drops the loading layer after 1 second
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) loadingScreen.style.display = 'none';
        }, 1000);

        // --- 2. Pure Browser Video & Camera Management Engine ---
        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.log("Webcam access restricted or missing. Running background only mode.");
                video.style.display = 'none';
            }
        }

        // Trigger autoplay permissions for video files on initial user interaction gestures
        function unlockAutoplay() {
            if (bgVideo) {
                bgVideo.play().catch(e => console.log("Autoplay context waiting..."));
            }
        }

        window.addEventListener('click', unlockAutoplay);
        window.addEventListener('touchstart', unlockAutoplay);

        // Run setup instantly on window launch
        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            unlockAutoplay();
        });
    </script>
</body>
</html>
