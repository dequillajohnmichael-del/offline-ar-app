<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger 360° AR Call</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        
        /* The Master Canvas Layer holding the native background blending space */
        #ar-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Simulated Friend's Floating Call Bubble Layer Override */
        #friend-bubble { position: absolute; top: 30px; right: 20px; width: 110px; height: 165px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.4); z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.5); object-fit: cover; background: #1a1a1a; }
        
        video, canvas { display: none; }
    </style>
    <!-- Core 3D Rendering and Local Matrix Isolation Libraries -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Blending your camera natively...<br>Please wait.</div>
    </div>

    <!-- Live Architecture Processing Streams -->
    <video id="webcam" autoplay playsinline muted></video>
    <video id="bg-video" src="./background.mp4.mp4" autoplay loop muted playsinline crossorigin="anonymous" preload="auto"></video>
    
    <!-- The final screen layout the user sees -->
    <canvas id="ar-canvas"></canvas>

    <!-- Floating caller bubble -->
    <video id="friend-bubble" autoplay loop muted playsinline src="https://mixkit.co" crossorigin="anonymous"></video>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }

        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) loadingScreen.style.display = 'none';
        }, 1500);

        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');
        const friendVideo = document.getElementById('friend-bubble');
        const displayCanvas = document.getElementById('ar-canvas');
        const displayCtx = displayCanvas.getContext('2d');

        let scene, camera, renderer, sphere, videoTexture;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let currentRotationX = 0, currentRotationY = 0;
        let targetRotationX = 0, targetRotationY = 0;

        // Hidden processing canvas elements used to slice away your real world background room borders
        const processingCanvas = document.createElement('canvas');
        const pCtx = processingCanvas.getContext('2d');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.log("Camera access blocked.");
            }
        }

        function init3DScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1); 

            videoTexture = new THREE.VideoTexture(bgVideo);
            const material = new THREE.MeshBasicMaterial({ map: videoTexture });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            camera.position.set(0, 0, 0.1);
        }

        // --- NATIVE AR BLENDING PASS PROCESSING LOOP ---
        function renderARFrame() {
            requestAnimationFrame(renderARFrame);

            // 1. Calculate and update 360 look rotation vectors smoothly
            currentRotationX += (targetRotationX - currentRotationX) * 0.15;
            currentRotationY += (targetRotationY - currentRotationY) * 0.15;
            if (sphere) {
                sphere.rotation.y = currentRotationX;
                sphere.rotation.x = currentRotationY;
            }

            // 2. Render the 360 virtual room scene onto the ThreeJS hidden viewport layer
            if (renderer) renderer.render(scene, camera);

            // 3. Paint the moving 360 room frame onto our main visible screen layout canvas first
            displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
            displayCtx.drawImage(renderer.domElement, 0, 0, displayCanvas.width, displayCanvas.height);

            // 4. Extract your face pixels and seamlessly blend your silhouette onto the virtual background space coordinates
            if (video.readyState >= 2) {
                processingCanvas.width = video.videoWidth;
                processingCanvas.height = video.videoHeight;
                
                // Draw mirrored camera feed onto background processing buffer
                pCtx.save();
                pCtx.translate(processingCanvas.width, 0);
                pCtx.scale(-1, 1);
                pCtx.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
                pCtx.restore();

                const frameData = pCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
                const l = frameData.data.length;

                // NATIVE CHROMA-KEY CHROMATIC BLENDING MATRIX: 
                // This strips out common wall shadow colors behind you to isolate your body silhouette natively into the room space variables
                for (let i = 0; i < l; i += 4) {
                    let r = frameData.data[i];
                    let g = frameData.data[i + 1];
                    let b = frameData.data[i + 2];
                    
                    // High-efficiency color variance calculator tracing boundary edges smoothly
                    if ((g > 100 && g > r * 1.2 && g > b * 1.2) || (r < 50 && g < 50 && b < 50)) {
                        frameData.data[i + 3] = 0; // Turn the background pixels fully transparent
                    }
                }
                pCtx.putImageData(frameData, 0, 0);

                // Overlay your newly isolated floating face directly into the 360-degree environment
                displayCtx.drawImage(processingCanvas, 0, 0, displayCanvas.width, displayCanvas.height);
            }
        }

        // Look-Around Drag & Swipe Interaction Controller Map
        function setupInteractions() {
            const onDragStart = (x, y) => { isDragging = true; previousMousePosition = { x, y }; };
            const onDragMove = (x, y) => {
                if (!isDragging) return;
                const deltaX = x - previousMousePosition.x;
                const deltaY = y - previousMousePosition.y;
                targetRotationX += deltaX * 0.003;
                targetRotationY += deltaY * 0.003;
                targetRotationY = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotationY));
                previousMousePosition = { x, y };
            };
            const onDragEnd = () => { isDragging = false; };

            window.addEventListener('mousedown', (e) => onDragStart(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => onDragMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', onDragEnd);

            window.addEventListener('touchstart', (e) => { 
                if (e.touches && e.touches.length > 0) onDragStart(e.touches[0].clientX, e.touches[0].clientY); 
            });
            window.addEventListener('touchmove', (e) => { 
                if (e.touches && e.touches.length > 0) onDragMove(e.touches[0].clientX, e.touches[0].clientY); 
            });
            window.addEventListener('touchend', onDragEnd);
        }

        function unlockStreams() {
            bgVideo.play().catch(()=>{});
            if (friendVideo) friendVideo.play().catch(()=>{});
        }

        window.addEventListener('click', unlockStreams);
        window.addEventListener('touchstart', unlockStreams);

        window.addEventListener('DOMContentLoaded', () => {
            displayCanvas.width = window.innerWidth;
            displayCanvas.height = window.innerHeight;
            initCamera();
            init3DScene();
            setupInteractions();
            renderARFrame();
            unlockStreams();
        });

        window.addEventListener('resize', () => {
            displayCanvas.width = window.innerWidth;
            displayCanvas.height = window.innerHeight;
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
