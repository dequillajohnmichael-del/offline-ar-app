<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger AR Call Simulator</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        
        /* YOUR LIVE SELFIE CAMERA FEED (Formatted precisely like the Messenger main frame caller window) */
        #webcam { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) scaleX(-1); width: 90%; max-width: 340px; height: 450px; object-fit: cover; border-radius: 24px; border: 3px solid #00ffcc; z-index: 10; box-shadow: 0 12px 35px rgba(0,0,0,0.7); background: #121212; display: none; }
        
        /* Floating Participant Video Call Bubble Overlay (Top Corner Like Messenger) */
        #friend-bubble { position: absolute; top: 30px; right: 20px; width: 110px; height: 165px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.4); z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.5); object-fit: cover; background: #1a1a1a; }
        
        /* 360-Degree WebGL Engine Layer Output Viewport */
        #canvas3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        video.hidden-stream { display: none; }
    </style>
    <!-- Three.js 3D Library Extension Dependency -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Syncing Messenger 360° AR Call...<br>Please wait.</div>
    </div>

    <!-- Active Structural Video Streams Mapping -->
    <video id="webcam" autoplay playsinline muted></video>
    <video id="bg-video" class="hidden-stream" src="./background.mp4.mp4" autoplay loop muted playsinline crossorigin="anonymous" preload="auto"></video>
    
    <!-- 3D Environment Space Display Mount -->
    <div id="canvas3d"></div>

    <!-- Simulated Companion Caller Bubble Layer Overlay -->
    <video id="friend-bubble" autoplay loop muted playsinline src="https://mixkit.co" crossorigin="anonymous"></video>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }

        // Fast loader pass threshold controller
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) loadingScreen.style.display = 'none';
        }, 1500);

        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');
        const friendVideo = document.getElementById('friend-bubble');
        const container = document.getElementById('canvas3d');

        let scene, camera, renderer, sphere, videoTexture;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let currentRotationX = 0, currentRotationY = 0;
        let targetRotationX = 0, targetRotationY = 0;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.srcObject = stream;
                video.style.display = "block"; // Unlock crisp visible frame overlay
            } catch (err) {
                console.log("Webcam access restricted.");
            }
        }

        function init3DEnvironment() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Create an inverse spatial mapping sphere framework to fold the panoramic background video fully around you
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1); 

            videoTexture = new THREE.VideoTexture(bgVideo);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const material = new THREE.MeshBasicMaterial({ map: videoTexture });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            camera.position.set(0, 0, 0.1);
        }

        // Core continuous processing rendering math loop tracking look calculations
        function animate() {
            requestAnimationFrame(animate);

            if (isDragging) {
                currentRotationX += (targetRotationX - currentRotationX) * 0.15;
                currentRotationY += (targetRotationY - currentRotationY) * 0.15;
                sphere.rotation.y = currentRotationX;
                sphere.rotation.x = currentRotationY;
            }

            renderer.render(scene, camera);
        }

        // --- Look-Around Drag & Swipe Interaction Controller Map ---
        function setupInteractionHandlers() {
            const onDragStart = (x, y) => { isDragging = true; previousMousePosition = { x, y }; };
            const onDragMove = (x, y) => {
                if (!isDragging) return;
                const deltaX = x - previousMousePosition.x;
                const deltaY = y - previousMousePosition.y;
                targetRotationX += deltaX * 0.003;
                targetRotationY += deltaY * 0.003;
                targetRotationY = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotationY)); // Limit vertical head look view
                previousMousePosition = { x, y };
            };
            const onDragEnd = () => { isDragging = false; };

            // Desktop Mouse Triggers
            window.addEventListener('mousedown', (e) => onDragStart(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => onDragMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', onDragEnd);

            // Smartphone Touch/Swipe Triggers
            window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) onDragStart(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) onDragMove(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('touchend', onDragEnd);
        }

        function forceMediaPlayback() {
            if(bgVideo) bgVideo.play().catch(()=>{});
            if(friendVideo) friendVideo.play().catch(()=>{});
        }

        window.addEventListener('click', forceMediaPlayback);
        window.addEventListener('touchstart', forceMediaPlayback);

        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            init3DEnvironment();
            setupInteractionHandlers();
            animate();
            forceMediaPlayback();
        });

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
