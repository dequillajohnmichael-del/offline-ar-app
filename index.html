<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline WebAR Video Background</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        #disclaimer { font-size: 0.8rem; color: #888; margin-top: 30px; max-width: 320px; line-height: 1.5; }
        #ar-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { position: absolute; visibility: hidden; width: 1px; height: 1px; pointer-events: none; }
    </style>
    <!-- Stable Web Framework Dependencies -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Syncing high-performance AR engines...<br>Please keep internet on for this initial scan.</div>
        <div id="disclaimer">⚠️ For permanent offline background features, tap your browser menu and choose <b>"Open in Safari"</b> or <b>"Open in Chrome"</b> instead of staying inside the temporary QR scanner window.</div>
    </div>

    <!-- Background media asset containers mapping into live calculations -->
    <video id="webcam" autoplay playsinline muted></video>
    <video id="bg-video" src="./background.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
    
    <canvas id="ar-canvas"></canvas>

    <script>
        // --- 1. Service Worker Caching Registration Engine ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then((reg) => {
                if (reg.installing) {
                    reg.installing.addEventListener('statechange', (e) => {
                        if (e.target.state === 'installed') {
                            document.getElementById('status').innerHTML = "🎉 AR Engine Ready!<br>This application is now available 100% offline.";
                            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 2500);
                        }
                    });
                } else {
                    document.getElementById('status').innerText = "Launching offline environment...";
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1200);
                }
            });
        }

        // --- 2. Advanced AR Matrix Compositing Architecture ---
        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');
        const canvas = document.getElementById('ar-canvas');
        const ctx = canvas.getContext('2d');
        
        let scene, camera, renderer, sphere, videoTexture, selfieSegmentation;

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                audio: false 
            });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = () => resolve(video));
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Map your moving background.mp4 texture onto an inside-out 3D spatial wrapper
            const geometry = new THREE.SphereGeometry(500, 32, 32);
            geometry.scale(-1, 1, 1); 
            
            videoTexture = new THREE.VideoTexture(bgVideo);
            const material = new THREE.MeshBasicMaterial({ map: videoTexture });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);
            
            camera.position.set(0, 0, 0.1);
            bgVideo.play().catch(() => {});
        }

        // AI segmentation frame data rendering processor loop
        function onSegmentationResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Render the live virtual 360 panoramic animation room behind the user space
            renderer.render(scene, camera);
            ctx.drawImage(renderer.domElement, 0, 0, canvas.width, canvas.height);
            
            // Build mask overlay tracking coordinates around body outline boundaries
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            
            // Render mirrored webcam stream variables under the isolated frame cutout texture
            ctx.globalCompositeOperation = 'destination-over';
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1); 
            ctx.drawImage(results.image, 0, 0, -canvas.width, canvas.height);
            
            ctx.restore();
        }

        async function startAR() {
            await initCamera();
            initThreeJS();
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Initialize the MediaPipe processing engine variables using locally cached data components
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://jsdelivr.net{file}`
            });

            selfieSegmentation.setOptions({ modelSelection: 1 }); // 1 = Optimized Landscape target calculation rules for mobile
            selfieSegmentation.onResults(onSegmentationResults);

            async function processVideoFrame() {
                if (!video.paused && !video.ended) {
                    await selfieSegmentation.send({ image: video });
                }
                requestAnimationFrame(processVideoFrame);
            }
            processVideoFrame();
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Autoplay safe fallback bypass hooks mapping user screen tap triggers
        window.addEventListener('click', () => { if (bgVideo) bgVideo.play(); });
        window.addEventListener('touchstart', () => { if (bgVideo) bgVideo.play(); });

        startAR().catch(err => {
            document.getElementById('status').innerHTML = "❌ Camera Error<br>Please reset browser permissions.";
            console.error(err);
        });
    </script>
</body>
</html>
