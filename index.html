<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline WebAR Background</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a192f; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        #tap-instruction { font-size: 1rem; color: #00ffcc; margin-top: 15px; font-weight: bold; display: none; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; border: 1px solid #00ffcc; }
        
        /* The Moving Video Background (Stretched across full screen) */
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Live Camera Overlay Bubble Frame */
        #webcam { position: absolute; top: 20px; right: 20px; width: 140px; height: 185px; object-fit: cover; border-radius: 16px; border: 3px solid #00ffcc; transform: scaleX(-1); z-index: 5; box-shadow: 0 8px 25px rgba(0,0,0,0.6); background: #121212; display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Syncing WebAR moving mechanics...<br>Please wait.</div>
        <div id="tap-instruction">👆 CLICK SCREEN TO ACTIVATE VIDEO</div>
    </div>

    <!-- Active Moving Background Video (Targeting your exact double extension file name) -->
    <video id="bg-video" autoplay loop muted playsinline crossorigin="anonymous" preload="auto">
        <source src="./background.mp4.mp4" type="video/mp4">
        <source src="./background.mp4" type="video/mp4">
    </video>

    <!-- Camera Overlay -->
    <video id="webcam" autoplay playsinline muted></video>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW bypass:", err));
        }

        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');

        // Drop the loading curtain after 1.2 seconds, or display touch hints if playback stalls
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (bgVideo.paused) {
                document.getElementById('tap-instruction').style.display = 'block';
            } else {
                if (loadingScreen) loadingScreen.style.display = 'none';
            }
        }, 1200);

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.style.display = "block"; 
                video.srcObject = stream;
            } catch (err) {
                console.log("Webcam bypassed or missing container parameters.");
            }
        }

        // Force user gesture activation rule implementation
        function forcePlayVideo() {
            if (bgVideo) {
                bgVideo.play().then(() => {
                    const loadingScreen = document.getElementById('loading-screen');
                    if (loadingScreen) loadingScreen.style.display = 'none';
                }).catch(e => console.log("Autoplay context locking loop...", e));
            }
        }

        window.addEventListener('click', forcePlayVideo);
        window.addEventListener('touchstart', forcePlayVideo);

        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            forcePlayVideo();
        });
    </script>
</body>
</html>
