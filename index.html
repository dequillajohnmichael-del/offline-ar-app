<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger AR Simulator</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; user-select: none; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
        #tap-instruction { font-size: 1rem; color: #00ffcc; margin-top: 15px; font-weight: bold; display: none; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; border: 1px solid #00ffcc; }
        
        /* The Master AR Output Canvas stretching full screen */
        #ar-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Simulated Friend's Video Call Bubble Overlay (Top Corner Like Messenger) */
        #friend-bubble { position: absolute; top: 30px; right: 20px; width: 110px; height: 165px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.4); z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.5); object-fit: cover; background: #1a1a1a; }
        
        /* Hidden layout streams */
        video { display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">Syncing Messenger AR Filter...<br>Please wait.</div>
        <div id="tap-instruction">👆 TAP SCREEN TO START CALL</div>
    </div>

    <!-- Live Messenger Call Layout Structures -->
    <video id="webcam" autoplay playsinline muted></video>
    <video id="bg-video" src="./background.mp4.mp4" autoplay loop muted playsinline crossorigin="anonymous" preload="auto"></video>
    <canvas id="ar-canvas"></canvas>

    <!-- Simulated secondary caller window overlay -->
    <video id="friend-bubble" autoplay loop muted playsinline src="https://mixkit.co" crossorigin="anonymous"></video>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }

        const video = document.getElementById('webcam');
        const bgVideo = document.getElementById('bg-video');
        const friendVideo = document.getElementById('friend-bubble');
        const canvas = document.getElementById('ar-canvas');
        const ctx = canvas.getContext('2d');

        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (bgVideo.paused) {
                document.getElementById('tap-instruction').style.display = 'block';
            } else {
                if (loadingScreen) loadingScreen.style.display = 'none';
            }
        }, 1200);

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
                return new Promise((resolve) => video.onloadedmetadata = () => resolve(video));
            } catch (err) {
                console.log("Webcam permission denied or delayed.");
            }
        }

        // Real-Time Matrix Masking Engine Loop
        function drawScene() {
            requestAnimationFrame(drawScene);
            
            ctx.save();
            // Step A: Draw the custom moving background video full screen
            if (bgVideo.readyState >= 2) {
                ctx.drawImage(bgVideo, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Step B: Mirror and overlay your live face frame directly over the scene matrix
            if (video.readyState >= 2) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1); // Natural mirror transformation
                
                // UPDATED: Changed from 0.85 to 1.0 for solid, non-transparent video visibility
                ctx.globalAlpha = 1.0; 
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            ctx.restore();
        }

        function unlockMediaStreams() {
            bgVideo.play().catch(()=>{});
            if(friendVideo) friendVideo.play().catch(()=>{});
            initCamera(); // Force check camera stream trigger on screen tap context
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) loadingScreen.style.display = 'none';
        }

        window.addEventListener('click', unlockMediaStreams);
        window.addEventListener('touchstart', unlockMediaStreams);

        window.addEventListener('DOMContentLoaded', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initCamera();
            drawScene();
            unlockMediaStreams();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
